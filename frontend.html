<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
body { font-family: sans-serif; padding: 20px; background: #f5f5f5; }
.ok { color: green; font-weight: bold; }
.fail { color: red; font-weight: bold; }
#log { background: white; padding: 16px; border-radius: 8px; margin-top: 12px; }
#log p { margin: 6px 0; }
</style>
</head>
<body>
<h2>MyGrubinessPal — Diagnóstico</h2>
<div id="log"><p>Testando...</p></div>
<script>
const log = document.getElementById('log');
log.innerHTML = '';

function addLog(msg, ok) {
  const p = document.createElement('p');
  p.className = ok ? 'ok' : 'fail';
  p.textContent = (ok ? '✅ ' : '❌ ') + msg;
  log.appendChild(p);
}

async function runTests() {
  // Test 1: Fetch React
  try {
    const r = await fetch('https://unpkg.com/react@18/umd/react.production.min.js');
    if (r.ok) addLog('React carregou', true);
    else addLog('React falhou: ' + r.status, false);
  } catch(e) { addLog('React falhou: ' + e.message, false); }

  // Test 2: Fetch Recharts
  try {
    const r = await fetch('https://unpkg.com/recharts@2.12.7/umd/Recharts.js');
    if (r.ok) addLog('Recharts carregou', true);
    else addLog('Recharts falhou: ' + r.status, false);
  } catch(e) { addLog('Recharts falhou: ' + e.message, false); }

  // Test 3: Fetch Babel
  try {
    const r = await fetch('https://unpkg.com/@babel/standalone/babel.min.js');
    if (r.ok) addLog('Babel carregou', true);
    else addLog('Babel falhou: ' + r.status, false);
  } catch(e) { addLog('Babel falhou: ' + e.message, false); }

  // Test 4: Supabase
  const SB_URL = "{{SUPABASE_URL}}";
  const SB_KEY = "{{SUPABASE_KEY}}";
  try {
    addLog('Supabase URL: ' + (SB_URL.startsWith('http') ? SB_URL.slice(0, 40) + '...' : 'NÃO CONFIGURADO'), SB_URL.startsWith('http'));
    const r = await fetch(SB_URL + '/rest/v1/checklist_items?limit=1', {
      headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY }
    });
    if (r.ok) {
      const data = await r.json();
      addLog('Supabase respondeu: ' + data.length + ' item(ns)', true);
    } else {
      const txt = await r.text();
      addLog('Supabase erro ' + r.status + ': ' + txt.slice(0, 100), false);
    }
  } catch(e) { addLog('Supabase falhou: ' + e.message, false); }

  // Test 5: Tailwind
  try {
    const r = await fetch('https://cdn.tailwindcss.com');
    if (r.ok) addLog('Tailwind carregou', true);
    else addLog('Tailwind falhou: ' + r.status, false);
  } catch(e) { addLog('Tailwind falhou: ' + e.message, false); }
}

runTests();
</script>
</body>
</html>
